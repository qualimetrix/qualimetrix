# AI Mess Detector configuration for this project
# This file contains project-specific rule overrides

rules:
  # Distance from main sequence
  # Default: warning=0.3, error=0.5
  # Core namespaces (primitives, exceptions) naturally fall in "Zone of Pain"
  # which is acceptable for stable primitives
  distance:
    max_distance_warning: 0.4
    max_distance_error: 0.6
    exclude_namespaces:
      - AiMessDetector\Core\Exception
      - AiMessDetector\Core\Symbol
      - AiMessDetector\Core\Violation

  # NOC (Number of Children)
  # Default: warning=10, error=15
  # AbstractRule and AbstractCollector have many children by design (Template Method pattern)
  noc:
    warning: 12
    error: 20
