# Qualimetrix — project configuration (dogfooding)
#
# We analyze ourselves with our own tool. This config tunes thresholds
# and excludes known architectural hotspots instead of using a baseline.
#
# Decision framework for violations:
# 1. Real issue? → Fix the code
# 2. Structural (project nature)? → exclude_paths or exclude_namespaces
# 3. Threshold mismatch? → Tune threshold
# 4. One-off exception? → @qmx-threshold on the class/method
# 5. Genuinely inapplicable? → @qmx-ignore with reason

# Fail CI on errors only (warnings are informational)
failOn: error

# Self-analysis with duplication detection needs more memory
memory_limit: 1G

# Coupling: mark vendor dependencies as framework
coupling:
  framework-namespaces:
    - Symfony
    - PhpParser
    - Psr
    - Amp

rules:
  # --- Coupling ---

  # Core value objects are coupling magnets by design — every domain depends on them.
  coupling.cbo:
    exclude_namespaces:
      - Qualimetrix\Core\Violation
      - Qualimetrix\Core\Symbol
      - Qualimetrix\Core\Metric
      - Qualimetrix\Core\Rule
      - Qualimetrix\Rules\Support
      - Qualimetrix\Rules
    exclude_paths:
      # AST visitors depend on many php-parser node types (not actionable coupling)
      - src/Metrics/*Visitor.php
      - src/Metrics/*Trait.php
      # DI configurators wire all services (coupling is their job)
      - src/Infrastructure/DependencyInjection
      # Infrastructure console commands and pipeline orchestrators need many deps
      - src/Infrastructure/Console
      - src/Analysis/Pipeline
    namespace:
      warning: 16
      error: 25
    class:
      warning: 20
      error: 30

  # Core contracts and value objects are coupling hubs by design.
  coupling.class-rank:
    exclude_namespaces:
      - Qualimetrix\Core\Violation
      - Qualimetrix\Core\Symbol
      - Qualimetrix\Core\Metric
      - Qualimetrix\Core\Rule

  # Distance: Core leaf namespaces are maximally concrete with few abstractions.
  # This is by design for value objects.
  coupling.distance:
    exclude_namespaces:
      - Qualimetrix\Core
      - Qualimetrix\Core\Util
      - Qualimetrix\Core\ComputedMetric
      - Qualimetrix\Core\Suppression
      - Qualimetrix\Core\Violation
      - Qualimetrix\Core\Profiler
      - Qualimetrix\Reporting\Debt
      - Qualimetrix\Infrastructure\Serializer
      - Qualimetrix\Reporting\Formatter\Support
      - Qualimetrix\Analysis\Collection\Metric
    max_distance_warning: 0.5
    max_distance_error: 0.7

  coupling.instability:
    exclude_paths:
      # Visitors/configurators are inherently unstable (many outgoing, few incoming deps)
      - src/Metrics/*Visitor.php
      - src/Metrics/*Trait.php
      - src/Infrastructure/DependencyInjection
      # Console commands/orchestrators
      - src/Infrastructure/Console
      - src/Analysis/Pipeline
      - src/Baseline
      # Abstract base classes aggregate deps from all subclasses — instability is structural
      - src/Metrics/AbstractCollector.php
      - src/Rules/AbstractRule.php
    class:
      min_afferent: 2
    namespace:
      min_afferent: 2
      max_warning: 0.9
      max_error: 1.0

  # --- Complexity ---

  # AST visitors inherently have high NPath/CCN/WMC due to many node type branches.
  # This is structural complexity from matching PHP AST node types, not a design flaw.
  complexity.npath:
    exclude_paths:
      - src/Metrics
      - src/Rules/Design/*Rule.php
      - src/Reporting/Formatter/Summary/*Renderer.php
      - src/Rules/Support/ThresholdParser.php
      - src/Analysis/Duplication

  # Code duplication: Options classes share fromArray/threshold patterns by convention;
  # MetricHintProvider has intentionally similar hint blocks.
  # Raised min_tokens from 70→100 to reduce structural similarity false positives.
  duplication.code-duplication:
    min_tokens: 100
    exclude_paths:
      - src/Reporting/Health/MetricHintProvider.php
      - src/Rules/**/*Options.php
      - src/Metrics/Complexity/CognitiveComplexityVisitor.php

  complexity.cyclomatic:
    exclude_paths:
      - src/Metrics
      - src/Rules/Support/ThresholdParser.php
      - src/Rules/Design/*Rule.php
      - src/Reporting/Formatter/Sarif
      - src/Reporting/Health
      - src/Reporting/Formatter/Summary
      - src/Analysis/Pipeline
      - src/Baseline

  complexity.wmc:
    exclude_paths:
      - src/Metrics
      - src/Reporting/Health

  complexity.cognitive:
    exclude_paths:
      - src/Metrics
      - src/Analysis/Duplication
      - src/Reporting/Health
      - src/Reporting/Formatter/Summary
      - src/Reporting/Impact
      - src/Rules/Design/*Rule.php
      - src/Rules/Support/ThresholdParser.php

  # --- Code Smells ---

  # Boolean params in Options/config DTOs are by design. Keep the rule active
  # to catch future poorly-named booleans, but exclude structural categories.
  code-smell.boolean-argument:
    allowed_prefixes: [is, has, can, should, will, did, was]
    exclude_paths:
      - src/Rules/*Options.php
      - src/Analysis/*Options.php
      - src/Infrastructure/Console
      - src/Reporting
      - src/Core

  code-smell.error-suppression:
    allowed_functions:
      - file_get_contents
      - file_put_contents
      - fopen
      - unlink
      - mkdir
      - rename
      - rmdir
      - json_decode
      - token_get_all
      - proc_open
      - hash_file
      - igbinary_serialize
      - igbinary_unserialize
      - unserialize

  # Data-carrying objects and pipeline services need many constructor params.
  # This is a natural pattern for immutable VOs, not a design smell.
  code-smell.long-parameter-list:
    warning: 8
    error: 12
    exclude_paths:
      - src/Reporting/Report.php
      - src/Reporting/FormatterContext.php
      - src/Reporting/Health
      - src/Analysis/Collection
      - src/Analysis/Pipeline
      - src/Infrastructure/Console
      - src/Infrastructure/Parallel
    exclude_namespaces:
      - Qualimetrix\Core

  code-smell.constructor-overinjection:
    exclude_paths:
      - src/Reporting/Report.php
      - src/Reporting/FormatterContext.php
      - src/Reporting/Formatter/Summary

  # Cache operations use @ for intentional error suppression and empty catch
  # for "best effort" cache invalidation.
  # Empty catch blocks are flagged as warnings (default is error).
  # The one in CachedFileParser is intentional (best-effort caching).
  code-smell.empty-catch:
    exclude_paths:
      - src/Infrastructure/Ast

  # MethodCountMetrics tracks many per-class counts (each is a separate property)
  size.property-count:
    exclude_paths:
      - src/Metrics/Structure/MethodCountMetrics.php

  # --- Design ---

  # AbstractRule and AbstractCollector have many children — this is by design
  # (one rule/collector per metric category).
  design.noc:
    exclude_namespaces:
      - Qualimetrix\Rules
      - Qualimetrix\Metrics

  design.lcom:
    warning: 5
    exclude_paths:
      - src/Reporting/Health
      # Derived metric collectors are thin wrappers (low cohesion by nature)
      - src/Metrics/Coupling/*Collector.php

  design.god-class:
    exclude_paths:
      - src/Reporting/Health
      - src/Reporting/Formatter/Health
      - src/Rules/Coupling/CboRule.php

  # --- Maintainability ---
  maintainability.index:
    warning: 35
    error: 20

  # --- Health scores ---
  # Suppress health violations for namespaces with known structural reasons.
  computed.health:
    exclude_namespaces:
      - Qualimetrix\Rules\Support
      - Qualimetrix\Metrics\Halstead
      - Qualimetrix\Core\Violation
      - Qualimetrix\Metrics\Coupling
      - Qualimetrix\Metrics\Structure
      - Qualimetrix\Infrastructure\DependencyInjection\Configurator
      - Qualimetrix\Reporting\Impact
    exclude_paths:
      - src/Analysis/Collection/Dependency/DependencyGraph.php

# Health score thresholds: calibrated for a static analysis tool codebase.
# Cohesion/maintainability are naturally lower in visitor-heavy, config-heavy projects.
computed_metrics:
  health.cohesion:
    warning: 35
    error: 20
  health.maintainability:
    warning: 40
    error: 20
