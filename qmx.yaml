# Qualimetrix — project configuration (dogfooding)
#
# We analyze ourselves with our own tool. This config tunes thresholds
# and excludes known architectural hotspots instead of using a baseline.
#
# Decision framework for violations:
# 1. Real issue? → Fix the code
# 2. Structural (project nature)? → exclude_paths or exclude_namespaces
# 3. Threshold mismatch? → Tune threshold
# 4. One-off exception? → @qmx-threshold on the class/method
# 5. Genuinely inapplicable? → @qmx-ignore with reason

# Fail CI on errors only (warnings are informational)
failOn: error

# Self-analysis with duplication detection needs more memory
memory_limit: 1G

# Coupling: mark vendor dependencies as framework
coupling:
  framework-namespaces:
    - Symfony
    - PhpParser
    - Psr
    - Amp

# Architecture: enforce the layered design documented in CLAUDE.md.
#
# This topology replaces the former deptrac.yaml — every Analysis.* and
# Infrastructure.* sub-namespace is its own layer with an explicit allow-list,
# so cross-sublayer coupling (e.g. analysis-discovery → analysis-pipeline)
# is caught instead of hidden inside a flat parent layer.
#
# Dependency direction (high-level):
#   Infra → Analysis sub-layers → Metrics/Rules/Reporting/Configuration/Architecture → Core
#
# Declaration order matters (ADR 0006: first match wins). All layer patterns
# below are disjoint namespaces under Qualimetrix\*, so order only affects
# diagnostics (architecture.potential-shadow / architecture.unreachable-layer).
architecture:
  layers:
    # ── Core ───────────────────────────────────────────────────────
    - name: core
      patterns: ['Qualimetrix\Core\**']

    # ── Cross-cutting configuration infrastructure ─────────────────
    - name: configuration
      patterns: ['Qualimetrix\Configuration\**']

    # ── Architecture vertical slice (ADR 0010 pilot, ADR 0012) ─────
    - name: architecture
      patterns: ['Qualimetrix\Architecture\**']

    # ── Metrics — per-category template layer (Phase 2 direction 2)
    # Each metric category (Complexity, Coupling, CodeSmell, ...) is
    # independent; per-category layer visibility catches cross-category
    # coupling that a single flat `metrics` layer would mask.
    - name: 'metrics-{Category}'
      patterns: ['Qualimetrix\Metrics\{Category}\**']

    - name: rules
      patterns: ['Qualimetrix\Rules\**']
    - name: reporting
      patterns: ['Qualimetrix\Reporting\**']
    - name: baseline
      patterns: ['Qualimetrix\Baseline\**']

    # ── Analysis sub-layers (10) — pipeline glue ───────────────────
    - name: analysis-exception
      patterns: ['Qualimetrix\Analysis\Exception\**']
    - name: analysis-discovery
      patterns: ['Qualimetrix\Analysis\Discovery\**']
    - name: analysis-namespace
      patterns: ['Qualimetrix\Analysis\Namespace_\**']
    - name: analysis-repository
      patterns: ['Qualimetrix\Analysis\Repository\**']
    - name: analysis-duplication
      patterns: ['Qualimetrix\Analysis\Duplication\**']
    - name: analysis-aggregator
      patterns: ['Qualimetrix\Analysis\Aggregator\**']
    - name: analysis-ruleexecution
      patterns: ['Qualimetrix\Analysis\RuleExecution\**']
    - name: analysis-collection
      patterns: ['Qualimetrix\Analysis\Collection\**']
    - name: analysis-lifecycle
      patterns: ['Qualimetrix\Analysis\Lifecycle\**']
    - name: analysis-pipeline
      patterns: ['Qualimetrix\Analysis\Pipeline\**']

    # ── Infrastructure sub-layers (10) — adapters / glue ───────────
    - name: infra-serializer
      patterns: ['Qualimetrix\Infrastructure\Serializer\**']
    - name: infra-logging
      patterns: ['Qualimetrix\Infrastructure\Logging\**']
    - name: infra-profiler
      patterns: ['Qualimetrix\Infrastructure\Profiler\**']
    - name: infra-rule
      patterns: ['Qualimetrix\Infrastructure\Rule\**']
    - name: infra-git
      patterns: ['Qualimetrix\Infrastructure\Git\**']
    - name: infra-cache
      patterns: ['Qualimetrix\Infrastructure\Cache\**']
    - name: infra-ast
      patterns: ['Qualimetrix\Infrastructure\Ast\**']
    - name: infra-parallel
      patterns: ['Qualimetrix\Infrastructure\Parallel\**']
    - name: infra-console
      patterns: ['Qualimetrix\Infrastructure\Console\**']
    - name: infra-di
      patterns: ['Qualimetrix\Infrastructure\DependencyInjection\**']

  allow:
    # ── Core: no upward deps ───────────────────────────────────────
    core: []

    # ── Configuration: Core + Architecture (ConfigurationPipeline
    # consumes ArchitectureConfigurationFactory; ResolvedConfiguration
    # exposes ArchitectureConfiguration VO) ────────────────────────
    configuration: [core, architecture]

    # ── Architecture vertical slice ────────────────────────────────
    # External boundary (per ADR 0010): Core, Rules (RuleInterface),
    # Configuration (YamlConfigLoader/ConfigSchema), Analysis.Lifecycle.
    architecture: [core, rules, configuration, analysis-lifecycle]

    # ── Domain leaves: each metric category and Rules/Reporting/
    # Baseline depend on Core only (parity with former deptrac) ────
    'metrics-*': [core]
    rules:       [core]
    reporting:   [core]
    baseline:    [core]

    # ── Analysis sub-layers ────────────────────────────────────────
    analysis-exception:     [core]
    analysis-discovery:     [core]
    analysis-namespace:     [core, configuration]
    analysis-repository:    [core]
    analysis-duplication:   [core, configuration]
    analysis-aggregator:    [core, analysis-exception]
    analysis-ruleexecution: [core, configuration]
    analysis-collection:    [core, baseline, analysis-exception]
    analysis-lifecycle:     [core, configuration]
    # Pipeline is the orchestration hub — sees every domain plus all
    # other Analysis sub-layers, but not other Infra sub-layers.
    analysis-pipeline:
      - core
      - configuration
      - baseline
      - reporting
      - architecture
      - rules
      - 'metrics-*'
      - analysis-exception
      - analysis-discovery
      - analysis-namespace
      - analysis-repository
      - analysis-duplication
      - analysis-aggregator
      - analysis-ruleexecution
      - analysis-collection
      - analysis-lifecycle

    # ── Infrastructure leaves ──────────────────────────────────────
    infra-serializer: [core]
    infra-logging:    [core]
    infra-profiler:   [core]
    infra-rule:       [core, configuration]
    infra-git:        [core, configuration, analysis-discovery]

    # ── Infrastructure mid-level ───────────────────────────────────
    infra-cache:    [core, configuration, infra-serializer]
    infra-ast:      [core, configuration, infra-cache]
    infra-parallel:
      - core
      - configuration
      - baseline
      - analysis-collection
      - infra-serializer
      - infra-ast
      - infra-cache

    # ── Infrastructure hubs ────────────────────────────────────────
    # Console wires the user-facing CLI; pulls every Analysis sub-layer
    # it orchestrates plus Reporting/Baseline/Architecture and most
    # Infra leaves. Does NOT see Metrics directly (those go through DI).
    infra-console:
      - core
      - configuration
      - baseline
      - reporting
      - architecture
      - analysis-pipeline
      - analysis-collection
      - analysis-discovery
      - analysis-namespace
      - analysis-repository
      - analysis-ruleexecution
      - analysis-lifecycle
      - infra-git
      - infra-rule
      - infra-cache
      - infra-logging
      - infra-profiler
      - infra-parallel

    # DI configurator wires every service. Edges to the metric
    # collectors are constrained by `relations:` — the container
    # references collectors but must NEVER inherit from them, so a
    # future `class FooInfra extends BarCollector` is caught at
    # config time.
    infra-di:
      - core
      - configuration
      - baseline
      - reporting
      - architecture
      - rules
      - analysis-exception
      - analysis-discovery
      - analysis-namespace
      - analysis-repository
      - analysis-duplication
      - analysis-aggregator
      - analysis-ruleexecution
      - analysis-collection
      - analysis-lifecycle
      - analysis-pipeline
      - infra-serializer
      - infra-logging
      - infra-profiler
      - infra-rule
      - infra-git
      - infra-cache
      - infra-ast
      - infra-parallel
      - infra-console
      - target: 'metrics-*'
        relations: [type_reference, new, static_access, class_const_fetch, attribute, runtime_check]

  # Warn about edges touching classes outside our own namespaces
  # (vendor, etc.). Default ignore mode is fine for vendor noise.
  coverage: ignore

rules:
  # --- Coupling ---

  # Core value objects are coupling magnets by design — every domain depends on them.
  coupling.cbo:
    exclude_namespaces:
      - Qualimetrix\Core\Violation
      - Qualimetrix\Core\Symbol
      - Qualimetrix\Core\Metric
      - Qualimetrix\Core\Rule
      - Qualimetrix\Core\Path
      - Qualimetrix\Rules\Support
      - Qualimetrix\Rules
    exclude_paths:
      # AST visitors depend on many php-parser node types (not actionable coupling)
      - src/Metrics/*Visitor.php
      - src/Metrics/*Trait.php
      # DI configurators wire all services (coupling is their job)
      - src/Infrastructure/DependencyInjection
      # Infrastructure console commands and pipeline orchestrators need many deps
      - src/Infrastructure/Console
      - src/Analysis/Pipeline
    namespace:
      warning: 16
      error: 25
    class:
      warning: 20
      error: 30

  # Core contracts and value objects are coupling hubs by design.
  coupling.class-rank:
    exclude_namespaces:
      - Qualimetrix\Core\Violation
      - Qualimetrix\Core\Symbol
      - Qualimetrix\Core\Metric
      - Qualimetrix\Core\Rule
      - Qualimetrix\Core\Dependency

  # Distance: leaf namespaces holding pure value objects, enums, and exceptions
  # are maximally concrete with few abstractions — that is the point of a
  # domain-VO sub-namespace. The Architecture/Domain/* tree is the vertical
  # slice's equivalent of the Core leaf VO namespaces (ADR 0010).
  coupling.distance:
    exclude_namespaces:
      - Qualimetrix\Core
      - Qualimetrix\Core\Util
      - Qualimetrix\Core\ComputedMetric
      - Qualimetrix\Core\Suppression
      - Qualimetrix\Core\Violation
      - Qualimetrix\Core\Profiler
      - Qualimetrix\Architecture\Domain
      - Qualimetrix\Architecture\Domain\Allow
      - Qualimetrix\Architecture\Domain\Layer
      - Qualimetrix\Reporting\Debt
      - Qualimetrix\Infrastructure\Serializer
      - Qualimetrix\Reporting\Formatter\Support
      - Qualimetrix\Analysis\Collection\Metric
    max_distance_warning: 0.5
    max_distance_error: 0.7

  coupling.instability:
    exclude_paths:
      # Visitors/configurators are inherently unstable (many outgoing, few incoming deps)
      - src/Metrics/*Visitor.php
      - src/Metrics/*Trait.php
      - src/Infrastructure/DependencyInjection
      # Console commands/orchestrators
      - src/Infrastructure/Console
      - src/Analysis/Pipeline
      - src/Baseline
      # Abstract base classes aggregate deps from all subclasses — instability is structural
      - src/Metrics/AbstractCollector.php
      - src/Rules/AbstractRule.php
    class:
      min_afferent: 2
    namespace:
      min_afferent: 2
      max_warning: 0.9
      max_error: 1.0

  # --- Complexity ---

  # AST visitors inherently have high NPath/CCN/WMC due to many node type branches.
  # This is structural complexity from matching PHP AST node types, not a design flaw.
  complexity.npath:
    exclude_paths:
      - src/Metrics
      - src/Rules/Design/*Rule.php
      - src/Reporting/Formatter/Summary/*Renderer.php
      - src/Rules/Support/ThresholdParser.php
      - src/Analysis/Duplication

  # Code duplication: Options classes share fromArray/threshold patterns by convention;
  # MetricHintProvider has intentionally similar hint blocks.
  # Raised min_tokens from 70→100 to reduce structural similarity false positives.
  duplication.code-duplication:
    min_tokens: 100
    exclude_paths:
      - src/Reporting/Health/MetricHintProvider.php
      - src/Rules/**/*Options.php
      - src/Metrics/Complexity/CognitiveComplexityVisitor.php

  complexity.cyclomatic:
    exclude_paths:
      - src/Metrics
      - src/Rules/Support/ThresholdParser.php
      - src/Rules/Design/*Rule.php
      - src/Reporting/Formatter/Sarif
      - src/Reporting/Health
      - src/Reporting/Formatter/Summary
      - src/Analysis/Pipeline
      - src/Baseline

  complexity.wmc:
    exclude_paths:
      - src/Metrics
      - src/Reporting/Health

  complexity.cognitive:
    exclude_paths:
      - src/Metrics
      - src/Analysis/Duplication
      - src/Reporting/Health
      - src/Reporting/Formatter/Summary
      - src/Reporting/Impact
      - src/Rules/Design/*Rule.php
      - src/Rules/Support/ThresholdParser.php

  # --- Code Smells ---

  # Boolean params in Options/config DTOs are by design. Keep the rule active
  # to catch future poorly-named booleans, but exclude structural categories.
  code-smell.boolean-argument:
    allowed_prefixes: [is, has, can, should, will, did, was]
    exclude_paths:
      - src/Rules/*Options.php
      - src/Analysis/*Options.php
      - src/Infrastructure/Console
      - src/Reporting
      - src/Core
      # Architecture vertical slice mirrors the Core/Rules categories that
      # were excluded above (ADR 0010 moved these from src/Core/Architecture/
      # and src/Rules/Architecture/ to src/Architecture/...).
      - src/Architecture/Domain
      - src/Architecture/Rules/*Options.php

  code-smell.error-suppression:
    allowed_functions:
      - file_get_contents
      - file_put_contents
      - fopen
      - unlink
      - mkdir
      - rename
      - rmdir
      - json_decode
      - token_get_all
      - proc_open
      - hash_file
      - igbinary_serialize
      - igbinary_unserialize
      - unserialize

  # Data-carrying objects and pipeline services need many constructor params.
  # This is a natural pattern for immutable VOs, not a design smell.
  code-smell.long-parameter-list:
    warning: 8
    error: 12
    exclude_paths:
      - src/Reporting/Report.php
      - src/Reporting/FormatterContext.php
      - src/Reporting/Health
      - src/Analysis/Collection
      - src/Analysis/Pipeline
      - src/Infrastructure/Console
      - src/Infrastructure/Parallel
    exclude_namespaces:
      - Qualimetrix\Core

  code-smell.constructor-overinjection:
    exclude_paths:
      - src/Reporting/Report.php
      - src/Reporting/FormatterContext.php
      - src/Reporting/Formatter/Summary

  # Cache operations use @ for intentional error suppression and empty catch
  # for "best effort" cache invalidation.
  # Empty catch blocks are flagged as warnings (default is error).
  # The one in CachedFileParser is intentional (best-effort caching).
  code-smell.empty-catch:
    exclude_paths:
      - src/Infrastructure/Ast

  # MethodCountMetrics tracks many per-class counts (each is a separate property)
  size.property-count:
    exclude_paths:
      - src/Metrics/Structure/MethodCountMetrics.php

  # --- Design ---

  # AbstractRule and AbstractCollector have many children — this is by design
  # (one rule/collector per metric category).
  design.noc:
    exclude_namespaces:
      - Qualimetrix\Rules
      - Qualimetrix\Metrics

  design.lcom:
    warning: 5
    exclude_paths:
      - src/Reporting/Health
      # Derived metric collectors are thin wrappers (low cohesion by nature)
      - src/Metrics/Coupling/*Collector.php

  design.god-class:
    exclude_paths:
      - src/Reporting/Health
      - src/Reporting/Formatter/Health
      - src/Rules/Coupling/CboRule.php

  # --- Maintainability ---
  maintainability.index:
    warning: 35
    error: 20

  # --- Health scores ---
  # Suppress health violations for namespaces with known structural reasons.
  computed.health:
    exclude_namespaces:
      - Qualimetrix\Rules\Support
      - Qualimetrix\Metrics\Halstead
      - Qualimetrix\Core\Violation
      - Qualimetrix\Metrics\Coupling
      - Qualimetrix\Metrics\Structure
      - Qualimetrix\Infrastructure\DependencyInjection\Configurator
      - Qualimetrix\Reporting\Impact
    exclude_paths:
      - src/Analysis/Collection/Dependency/DependencyGraph.php

# Health score thresholds: calibrated for a static analysis tool codebase.
# Cohesion/maintainability are naturally lower in visitor-heavy, config-heavy projects.
computed_metrics:
  health.cohesion:
    warning: 35
    error: 20
  health.maintainability:
    warning: 40
    error: 20
